<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Cricket Stats Table</title>
	<style>
		body {
			font-family: Verdana, sans-serif;
			background-color: #f0f8ff;
		}

		table {
			width: 80px;
			margin: 40px auto;
			border-collapse: collapse;
			box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			background-color: #ffffff;
		}

		caption {
			font-size: 22px;
			font-weight: bold;
			margin-bottom: 10px;
		}

		thead {
			background-color: #006400;
			color: white;
		}

		th, td {
			padding: 12px;
			border: 1px solid #ddd;
			text-align: center;
		}

		tbody tr:nth-child(odd) {
			background-color: #f9f9f9;
		}

		tbody tr:hover {
			background-color: #d4edda;
		}

		th {
			text-transform: uppercase;
			letter-spacing: 1px;
		}
	</style>
</head>	
<body>
	<table>
		<caption>Cricket player Statistics</caption>

		<!-- Table Header -->
		<thead>
			<tr>
				<th>Player</th>
				<th>Matches</th>
				<th>Runs</th>
				<th>Average</th>
				<th>Strike Rate</th>
			</tr>
			<!-- Table Body -->
			<tbody>
				<tr>
					<td>Virat kohli</td>
					<td>275</td>
					<td>12898</td>
					<td>57.32</td>
					<td>93.25</td>
				</tr>
				<tr>
					<td>Rohit Sharma</td>
					<td>260</td>
					<td>10400</td>
					<td>49.50</td>
					<td>90.10</td>
				</tr>
				<tr>
					<td>MS Dhoni</td>
					<td>350</td>
					<td>10773</td>
					<td>50.58</td>
					<td>87.56</td>
				</tr>
				<tr>
					<td>KL Rahul</td>
					<td>75</td>
					<td>2800</td>
					<td>46.20</td>
					<td>88.30</td>
				</tr>
			</tbody>
		</thead>
	</table>
</body>	
</html>
